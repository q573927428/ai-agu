version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: agu_quant
      MYSQL_USER: agu_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agu123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agu-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://agu_user:${MYSQL_PASSWORD:-agu123}@mysql:3306/agu_quant
      - APP_ENV=production
      - MODEL_DIR=/app/models
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models
      - ./backend/.env:/app/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agu-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data: